<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalogue</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0f766e;
      --primary-hover: #115e59;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4f7 0%, #f8fafb 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(640px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .links {
      display: grid;
      gap: 10px;
    }
    a {
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      transition: all 0.15s ease;
      background: #fff;
    }
    a:hover {
      border-color: var(--primary);
      color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(15, 118, 110, 0.12);
    }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Catalogue Home</h1>
    <p>Select a catalogue entry point:</p>
    <div class="links">
      <a href="./75/">Open 75 Catalogue</a>
      <a href="./NTS/">Open NTS Catalogue</a>
    </div>
    <div class="note">If this page appears but inner pages fail, verify relative asset paths inside each subproject.</div>
  </main>
</body>
</html>
